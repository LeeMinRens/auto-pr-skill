name: Auto PR from skill.md
on:
  push:
    paths:
      - "skill.md"

jobs:
  create-pr:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v6
        with:
          commit-message: "Auto PR from skill.md"
          title: "Auto PR from skill.md"
          body: "This PR was generated automatically when skill.md was updated."
          branch: auto-pr-skill-md
          base: main
          add-paths: skill.md   # <--- ensures skill.md is staged into branch
          branch-suffix: timestamp
          delete-branch: true
